<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Badminton Poll</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c8e6c9">
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.svg">
  <style>
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #c8e6c9; margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .logo { width: 80px; height: 80px; margin: 10px 0; }
    .admin-card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); max-width: 500px; width: 100%; display: flex; flex-direction: column; }
    h2 { text-align: center; margin: 0 0 10px; color: #1e1e1e; }
    .login-area { text-align: center; margin-bottom: 15px; }
    .login-area input { width: 80%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; text-align: center; font-size: 1rem; }
    .login-btn { background: #1565c0; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .roster, .poll-section { margin-bottom: 20px; }
    .roster h3, .poll-section h3 { color: #1e1e1e; margin: 0 0 10px; }
    .roster-list { max-height: 35vh; overflow-y: auto; }
    .player-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; }
    .player-name { font-weight: 500; }
    .passcode-reveal { font-size: 0.85rem; color: #555; margin-left: 8px; }
    .poll-spot-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 0.9rem; }
    .poll-spot-name { font-weight: 500; }
    .poll-spot-time { font-size: 0.8rem; color: #666; }
    .btn-section { margin-top: auto; }
    .btn-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-test { background: #2e7d32; }
    .btn-clear-poll { background: #c62828; }
    .btn-reset { background: #b71c1c; }
    .btn-passwords { background: #1565c0; }
    .btn-add-member { background: #00695c; }
    .btn-show-poll { background: #1565c0; }
    .btn-hide-poll { background: #888; }
    .footer { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #888; }
    .msg { margin-top: 10px; font-weight: bold; text-align: center; min-height: 20px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/></filter>
      <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
      <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f2f9ff"/><stop offset="100%" stop-color="#b8d8f8"/></linearGradient>
    </defs>
    <rect x="15" y="15" width="70" height="70" rx="18" fill="white" filter="url(#panelShadow)"/>
    <g transform="translate(50,50) scale(0.8) translate(-50,-50)">
      <circle cx="50" cy="50" r="34" fill="url(#drop)" stroke="#e63946" stroke-width="7" filter="url(#iconShadow)"/>
      <ellipse cx="40" cy="33" rx="8" ry="5" fill="white" opacity="0.5" transform="rotate(-25, 40, 33)"/>
      <circle cx="44" cy="29" r="2" fill="white" opacity="0.8"/>
      <text font-size="32" x="44" y="50" dominant-baseline="central" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🗳️</text>
      <text font-size="32" x="56" y="50" dominant-baseline="central" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🏸</text>
    </g>
  </svg>

  <div class="admin-card">
    <h2>Admin Controls</h2>

    <!-- Login / Password area (hidden initially) -->
    <div id="loginArea" class="login-area hidden">
      <input type="password" id="adminKey" placeholder="Admin key" oninput="checkKey()">
      <br><small style="color:#888;">Enter admin key to unlock controls</small>
    </div>
    <div id="loginBtnArea" class="login-area">
      <button class="login-btn" onclick="showLogin()">🔐 Admin Login</button>
    </div>

    <!-- Registered Players (top, scrollable) -->
    <div class="roster">
      <h3>Registered Players</h3>
      <div id="rosterList" class="roster-list"></div>
    </div>

    <!-- Current Poll (hidden by default) -->
    <div id="pollSection" class="poll-section hidden">
      <h3>Current Poll</h3>
      <div id="pollView"></div>
    </div>

    <!-- Admin control buttons (hidden until key is valid) -->
    <div id="adminControls" class="btn-section hidden">
      <div class="btn-row">
        <button class="btn btn-test" id="addTestBtn" onclick="addTestPlayers()">Add Test Players</button>
        <button class="btn btn-show-poll" id="togglePollBtn" onclick="togglePoll()">Show Poll</button>
        <button class="btn btn-clear-poll" id="clearPollBtn" onclick="clearPoll()">Clear Current Poll</button>
        <button class="btn btn-reset" id="resetBtn" onclick="resetAll()">Clear Registration</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-passwords" id="passwordsBtn" onclick="enablePasswords()">See Passwords</button>
        <button class="btn btn-add-member" id="addMemberBtn" onclick="addNewMember()">Add New Member</button>
      </div>
      <div id="message" class="msg"></div>
    </div>
  </div>
  <div class="footer">Badminton Poll v0.5.1</div>

  <script>
    const API = 'https://pollapp-rlmm.onrender.com';
    const keyInput = document.getElementById('adminKey');
    const message = document.getElementById('message');
    let adminKeyValid = false;
    let showPasswordsEnabled = false;
    let passcodeData = {};
    let pollVisible = false;

    function showLogin() {
      document.getElementById('loginBtnArea').classList.add('hidden');
      document.getElementById('loginArea').classList.remove('hidden');
      keyInput.value = ''; // clear previous
      keyInput.focus();
    }

    function checkKey() {
      const newKeyValid = (keyInput.value === 'bundbppgmbh');
      if (newKeyValid !== adminKeyValid) {
        adminKeyValid = newKeyValid;
        const controls = document.getElementById('adminControls');
        if (adminKeyValid) {
          controls.classList.remove('hidden');
          // hide password input again after successful login
          document.getElementById('loginArea').classList.add('hidden');
        } else {
          controls.classList.add('hidden');
          showPasswordsEnabled = false;
          document.getElementById('pollSection').classList.add('hidden');
          pollVisible = false;
          document.getElementById('togglePollBtn').textContent = 'Show Poll';
        }
        refreshAll();
      }
    }

    // ========== Load Poll ==========
    async function loadPoll() {
      try {
        const res = await fetch(`${API}/current-poll`);
        const poll = await res.json();
        const pollDiv = document.getElementById('pollView');
        if (!poll.exists) {
          pollDiv.innerHTML = '<p style="color:#888;">No active poll.</p>';
          return;
        }
        let html = `<p style="margin:0 0 8px; font-size:0.9rem;">${poll.title} – Capacity: ${poll.capacity}</p>`;
        const confirmed = poll.spots.filter(s => !s.cancelled);
        const cancelled = poll.spots.filter(s => s.cancelled);
        if (confirmed.length === 0 && cancelled.length === 0) {
          html += '<p style="color:#888;">No spots claimed yet.</p>';
        } else {
          for (let i = 0; i < confirmed.length; i++) {
            const s = confirmed[i];
            const cls = i < poll.capacity ? 'green' : 'amber';
            const time = new Date(s.claimedAt).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
            html += `<div class="poll-spot-row"><span style="color:${cls};">● ${s.name}</span><span class="poll-spot-time">${time}</span></div>`;
          }
          for (const s of cancelled) {
            const time = new Date(s.claimedAt).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
            html += `<div class="poll-spot-row"><span style="color:blue;text-decoration:line-through;">● ${s.name}</span><span class="poll-spot-time">${time}</span></div>`;
          }
        }
        pollDiv.innerHTML = html;
      } catch (e) {
        document.getElementById('pollView').innerHTML = '<p style="color:#c62828;">Could not load poll.</p>';
      }
    }

    function togglePoll() {
      const section = document.getElementById('pollSection');
      const btn = document.getElementById('togglePollBtn');
      if (pollVisible) {
        section.classList.add('hidden');
        btn.textContent = 'Show Poll';
        pollVisible = false;
      } else {
        section.classList.remove('hidden');
        btn.textContent = 'Hide Poll';
        pollVisible = true;
        loadPoll();
      }
    }

    // ========== Load Roster ==========
    async function loadRoster() {
      if (!adminKeyValid) {
        document.getElementById('rosterList').innerHTML = '<p style="color:#888;">Enter admin key to view.</p>';
        return;
      }
      try {
        const [regRes, pollRes] = await Promise.all([
          fetch(`${API}/admin/registered?key=${encodeURIComponent(keyInput.value)}`),
          fetch(`${API}/current-poll`)
        ]);
        const regData = await regRes.json();
        const pollData = await pollRes.json();

        if (!regRes.ok) {
          document.getElementById('rosterList').innerHTML = `<p style="color:#c62828;">${regData.error}</p>`;
          return;
        }

        const spotMap = {};
        if (pollData.exists) {
          pollData.spots.forEach((spot, index) => {
            if (!spot.cancelled) {
              spotMap[spot.name] = index < pollData.capacity ? 'green' : 'amber';
            } else {
              spotMap[spot.name] = 'blue';
            }
          });
        }

        if (showPasswordsEnabled) {
          try {
            const passRes = await fetch(`${API}/admin/passcodes?key=${encodeURIComponent(keyInput.value)}`);
            if (passRes.ok) {
              const passData = await passRes.json();
              passData.passcodes.forEach(p => { passcodeData[p.name] = p.passcode; });
            }
          } catch (e) {}
        }

        const players = regData.registered;
        if (players.length === 0) {
          document.getElementById('rosterList').innerHTML = '<p style="color:#888;">No registered players.</p>';
          return;
        }

        let html = '';
        players.forEach(p => {
          const color = spotMap[p.name] || 'black';
          let extras = '';
          if (showPasswordsEnabled) {
            const pass = passcodeData[p.name] !== undefined ? (passcodeData[p.name] || '—') : '—';
            extras += `<span class="passcode-reveal" id="pass-${p.name}">${pass}</span>`;
            setTimeout(() => {
              const el = document.getElementById(`pass-${p.name}`);
              if (el) el.textContent = '';
            }, 3000);
          }
          html += `<div class="player-row">
            <span class="player-name" style="color:${color};">${p.name}${p.isAdmin ? ' 🛡️' : ''}</span>
            <div>${extras}</div>
          </div>`;
        });
        document.getElementById('rosterList').innerHTML = html;
      } catch (e) {
        document.getElementById('rosterList').innerHTML = '<p style="color:#c62828;">Error loading roster.</p>';
      }
    }

    function refreshAll() {
      if (adminKeyValid) {
        loadRoster();
        if (pollVisible) loadPoll();
      } else {
        document.getElementById('rosterList').innerHTML = '<p style="color:#888;">Enter admin key to view.</p>';
        document.getElementById('pollView').innerHTML = '';
      }
    }

    async function addTestPlayers() {
      if (!adminKeyValid) return;
      const res = await fetch(`${API}/admin/add-test-players`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminKey: keyInput.value })
      });
      const data = await res.json();
      message.textContent = data.success ? '✅ Test players added & claimed.' : `❌ ${data.error || 'Failed'}`;
      refreshAll();
    }

    async function clearPoll() {
      if (!adminKeyValid) return;
      const res = await fetch(`${API}/create-poll`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminKey: keyInput.value, title: 'Test Poll (auto-created)', capacity: 8 })
      });
      const data = await res.json();
      message.textContent = data.success ? '✅ Poll cleared.' : `❌ ${data.error || 'Failed'}`;
      refreshAll();
    }

    async function resetAll() {
      if (!adminKeyValid) return;
      if (!confirm('This will delete ALL registrations and spots. Continue?')) return;
      const res = await fetch(`${API}/admin/reset-all`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminKey: keyInput.value })
      });
      const data = await res.json();
      message.textContent = data.success ? '✅ All registrations and spots cleared.' : `❌ ${data.error || 'Failed'}`;
      showPasswordsEnabled = false;
      passcodeData = {};
      refreshAll();
    }

    function enablePasswords() {
      if (!adminKeyValid) return;
      showPasswordsEnabled = true;
      passcodeData = {};
      message.textContent = '🔓 Passwords enabled. Tap on names to see.';
      loadRoster();
    }

    async function addNewMember() {
      if (!adminKeyValid) return;
      const names = prompt('Enter name(s), comma‑separated:');
      if (!names) return;
      const res = await fetch(`${API}/admin/add-names`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminKey: keyInput.value, names })
      });
      const data = await res.json();
      if (data.success) {
        message.textContent = `✅ Added: ${data.added.join(', ') || 'none new'}`;
      } else {
        message.textContent = `❌ ${data.error || 'Failed'}`;
      }
      refreshAll();
    }

    // Initial load
    refreshAll();
    setInterval(refreshAll, 10000);
    keyInput.addEventListener('input', checkKey);
  </script>
</body>
</html>
