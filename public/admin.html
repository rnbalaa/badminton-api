<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Poll – Fun Teaser with QR</title>
  <style>
    body { background: #1e1e1e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
    canvas { display: none; }
    button { background: #e63946; color: white; border: none; padding: 16px 32px; font-size: 20px; font-weight: bold; border-radius: 16px; cursor: pointer; margin: 20px 0; box-shadow: 0 6px 15px rgba(0,0,0,0.4); }
    #preview { max-width: 90vw; max-height: 85vh; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border-radius: 20px; }
  </style>
</head>
<body>
  <canvas id="canvas" width="800" height="1200"></canvas>
  <img id="preview" alt="Teaser preview">
  <button onclick="downloadPNG()">📥 Download Teaser PNG</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 1200;

    // ==================== BACKGROUND: badminton court ====================
    ctx.fillStyle = '#2e7d32';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 6;
    ctx.strokeRect(40, 150, W - 80, H - 300);
    ctx.beginPath();
    ctx.moveTo(40, H/2 + 80);
    ctx.lineTo(W - 40, H/2 + 80);
    ctx.stroke();
    ctx.lineWidth = 3;
    for (let i = 0; i < 25; i++) {
      const x = 40 + i * ((W - 80) / 25);
      ctx.beginPath();
      ctx.moveTo(x, H/2 + 20);
      ctx.lineTo(x, H/2 + 140);
      ctx.stroke();
    }

    // ==================== STARBURST behind headline ====================
    ctx.save();
    ctx.translate(400, 190);
    ctx.fillStyle = '#ffcc00';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 25;
    ctx.beginPath();
    for (let i = 0; i < 24; i++) {
      const angle = (i * 30) * Math.PI / 180;
      const innerR = 50, outerR = 110;
      ctx.lineTo(Math.cos(angle - 0.1) * outerR, Math.sin(angle - 0.1) * outerR);
      ctx.lineTo(Math.cos(angle + 0.1) * innerR, Math.sin(angle + 0.1) * innerR);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // ==================== HEADLINE: "COMING SOON" ====================
    ctx.save();
    ctx.translate(400, 190);
    ctx.rotate(-0.06);
    ctx.font = '900 82px "Impact", "Arial Black", sans-serif';
    ctx.fillStyle = '#c62828';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 12;
    ctx.fillText('COMING SOON', 0, 0);
    ctx.restore();
    ctx.font = 'italic 44px "Georgia", serif';
    ctx.fillStyle = '#c62828';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 8;
    ctx.fillText('for you to test', 400, 280);

    // ==================== DRAW LOGO (canvas based, no distortion) ====================
    function drawLogo(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      const s = size / 100;
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = 15;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 6;
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, 15 * s, 15 * s, 70 * s, 70 * s, 18 * s, true, false);
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.save();
      ctx.beginPath();
      ctx.arc(50 * s, 50 * s, 34 * s, 0, 2 * Math.PI);
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 4;
      ctx.strokeStyle = '#e63946';
      ctx.lineWidth = 7 * s;
      ctx.stroke();
      ctx.restore();
      const gradient = ctx.createLinearGradient(50 * s, 30 * s, 50 * s, 70 * s);
      gradient.addColorStop(0, '#ffffff');
      gradient.addColorStop(0.6, '#d4ecff');
      gradient.addColorStop(1, '#b0d0f0');
      ctx.beginPath();
      ctx.arc(50 * s, 50 * s, 34 * s - 3.5 * s, 0, 2 * Math.PI);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.save();
      ctx.translate(40 * s, 33 * s);
      ctx.rotate(-25 * Math.PI / 180);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.ellipse(0, 0, 6 * s, 4 * s, 0, 0, 2 * Math.PI);
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.arc(44 * s, 29 * s, 1.5 * s, 0, 2 * Math.PI);
      ctx.fill();
      ctx.font = `bold ${28 * s}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🗳️', 44 * s, 50 * s);
      ctx.fillText('🏸', 58 * s, 50 * s);
      ctx.restore();
    }

    drawLogo(580, 60, 180);

    // ==================== FEATURE BADGE ====================
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(ctx, 60, 360, 420, 180, 20, true, false);
    ctx.font = 'bold 28px -apple-system, "Segoe UI", sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'left';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 6;
    let y = 400;
    const features = [
      '✅ No more 9 a.m. alarm',
      '🎲 Random Friday opening',
      '🏸 One‑tap claim & cancel',
      '↕️ Live waitlist & promotions'
    ];
    features.forEach(f => { ctx.fillText(f, 80, y); y += 42; });
    ctx.shadowBlur = 0;

    // ==================== MINI PHONE MOCKUP ====================
    function drawPhoneMockup(x, y, scale) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      ctx.fillStyle = '#1e1e1e';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 25;
      roundRect(ctx, 0, 0, 280, 560, 28, true, false);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#c8e6c9';
      roundRect(ctx, 12, 12, 256, 536, 18, true, false);
      ctx.fillStyle = '#1e1e1e';
      ctx.fillRect(12, 12, 256, 36);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Badminton Poll', 140, 35);
      const spots = [
        { name: 'Vedha', color: '#2e7d32' },
        { name: 'Venky', color: '#2e7d32' },
        { name: 'Dilee', color: '#ff9800' },
        { name: 'Bala (you)', color: '#1565c0', strikethrough: true }
      ];
      let sy = 65;
      spots.forEach(s => {
        ctx.fillStyle = s.color;
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(s.name, 30, sy);
        if (s.strikethrough) {
          ctx.strokeStyle = s.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(30, sy - 8);
          ctx.lineTo(30 + ctx.measureText(s.name).width, sy - 8);
          ctx.stroke();
        }
        sy += 38;
      });
      ctx.fillStyle = '#2e7d32';
      roundRect(ctx, 30, sy + 20, 200, 44, 12, true, false);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🏸 Claim a Spot', 130, sy + 42 + 22);
      ctx.fillStyle = '#c62828';
      roundRect(ctx, 30, sy + 80, 200, 44, 12, true, false);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Give Up', 130, sy + 102 + 22);
      ctx.restore();
    }

    drawPhoneMockup(80, 580, 1.2);

    // ==================== SHUTTLECOCK DECORATION ====================
    function drawShuttlecock(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.5, 0, Math.PI, true);
      ctx.fill();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      for (let i = -3; i <= 3; i++) {
        const angle = (i * 15) * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.sin(angle) * size * 0.8, -size * 0.5);
        ctx.stroke();
      }
      ctx.strokeStyle = '#e63946';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.5, Math.PI, 0);
      ctx.stroke();
      ctx.restore();
    }
    drawShuttlecock(620, 1000, 70);
    drawShuttlecock(160, 1020, 50);
    drawShuttlecock(680, 400, 40);

    // ==================== FUNFLAIR: colourful dots ====================
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(540, 500, 20, 0, 2*Math.PI);
    ctx.fill();
    ctx.fillStyle = '#ff6d00';
    ctx.beginPath();
    ctx.arc(400, 1020, 18, 0, 2*Math.PI);
    ctx.fill();
    ctx.fillStyle = '#e63946';
    ctx.beginPath();
    ctx.arc(700, 700, 15, 0, 2*Math.PI);
    ctx.fill();

    // ==================== QR CODE (bottom right) ====================
    const qrImg = new Image();
    qrImg.crossOrigin = 'Anonymous';
    qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=bit.ly/OurBadmintonPoll';
    qrImg.onload = () => {
      // draw white background to ensure contrast
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, 620, 1050, 140, 140, 16, true, false);
      ctx.drawImage(qrImg, 630, 1060, 120, 120);

      // Final preview and download
      const dataURL = canvas.toDataURL('image/png');
      document.getElementById('preview').src = dataURL;
    };

    function roundRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function downloadPNG() {
      const link = document.createElement('a');
      link.download = 'BadmintonPoll_Teaser.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
