<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Poll Test Harness</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f4e8; }
    button { padding: 12px 20px; margin: 8px; font-size: 1rem; cursor: pointer; border-radius: 10px; border: none; background: #2e7d32; color: white; }
    button.reset { background: #c62828; }
    #log { background: #1e1e1e; color: #ddd; padding: 15px; border-radius: 8px; margin-top: 15px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>🧪 One‑Click Test Harness</h2>
  <p>Use these buttons to simulate voters.</p>
  <button onclick="fillSpots(8)">✅ Fill 8 confirmed (green)</button>
  <button onclick="fillSpots(10)">✅ Fill 8 green + 2 amber</button>
  <button onclick="cancelRandomConfirm()">❌ Cancel a random green spot</button>
  <button class="reset" onclick="resetPoll()">🔄 Reset poll (clear all)</button>
  <div id="log"></div>

  <script>
    const API = 'https://pollapp-rlmm.onrender.com';
    function log(msg) {
      const div = document.createElement('div');
      div.textContent = msg;
      document.getElementById('log').appendChild(div);
      document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
    }

    async function registerAndClaim(name) {
      const regRes = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const regData = await regRes.json();
      if (!regRes.ok) {
        log(`❌ ${name} register: ${regData.error}`);
        return false;
      }
      const claimRes = await fetch(`${API}/claim-spot`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: regData.token })
      });
      const claimData = await claimRes.json();
      if (claimRes.ok) {
        log(`✅ ${name} claimed`);
        return true;
      } else {
        log(`❌ ${name} claim: ${claimData.error}`);
        return false;
      }
    }

    async function fillSpots(total) {
      log(`⏳ Claiming ${total} test spots...`);
      // Use dummy names Test1..Test10, CancelTest is available too but we'll skip it for fill
      for (let i = 1; i <= total; i++) {
        const name = 'Test' + i;
        await registerAndClaim(name);
      }
      log('🏁 Done – refresh the poll page to see the list.');
    }

    async function cancelRandomConfirm() {
      // Register a fresh dummy, claim, then cancel so we see promotion
      const name = 'CancelTest';
      log(`🛠️ Creating and cancelling ${name}...`);
      const regRes = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const regData = await regRes.json();
      if (!regRes.ok) { log(`❌ register: ${regData.error}`); return; }
      // claim
      const claimRes = await fetch(`${API}/claim-spot`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: regData.token })
      });
      const claimData = await claimRes.json();
      if (!claimRes.ok) { log(`❌ claim: ${claimData.error}`); return; }
      // cancel
      const cancelRes = await fetch(`${API}/cancel-spot`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: regData.token })
      });
      const cancelData = await cancelRes.json();
      if (cancelRes.ok) {
        log(`✅ Cancelled ${name} – first amber should promote to green`);
      } else {
        log(`❌ cancel: ${cancelData.error}`);
      }
    }

    async function resetPoll() {
      const res = await fetch(`${API}/create-poll`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminKey: 'bundbppgmbh', title: 'Test Poll (auto-created)', capacity: 8 })
      });
      const data = await res.json();
      if (res.ok) log('🔄 Poll cleared.');
      else log(`❌ reset: ${data.error}`);
    }
  </script>
</body>
</html>
