<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Poll</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c8e6c9">
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.svg">
  <style>
    body { font-family:-apple-system,'Segoe UI',sans-serif; background:#c8e6c9; margin:0; padding:20px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .logo { width:120px; height:120px; margin-bottom:15px; }
    h1 { display:none; }
    .poll-title { color:#1e1e1e; font-weight:600; margin-bottom:20px; text-align:center; font-size:1.2rem; }
    .card { background:white; border-radius:20px; padding:24px; box-shadow:0 8px 30px rgba(0,0,0,0.12); max-width:400px; width:100%; }
    .status-msg { text-align:center; font-weight:500; margin-bottom:15px; padding:12px; border-radius:10px; }
    .status-msg.loading { background:#fff3e0; color:#e65100; }
    .status-msg.error { background:#ffebee; color:#c62828; }
    .spots-list { display:flex; flex-direction:column; gap:6px; max-height:55vh; overflow-y:auto; margin-bottom:15px; }
    .spot-row { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-radius:10px; font-weight:500; }
    .spot-green { background:#e8f5e9; color:#2e7d32; }
    .spot-amber { background:#fff8e1; color:#f57f17; }
    .spot-blue { background:#e3f2fd; color:#1565c0; text-decoration:line-through; }
    .small { font-size:0.8rem; color:#666; }
    .separator { height:1px; background:#ccc; margin:4px 0; opacity:0.6; }
    .btn { width:100%; padding:16px; font-size:1.2rem; border:none; border-radius:14px; cursor:pointer; font-weight:600; margin-bottom:10px; transition:background 0.2s; }
    .btn-claim { background:#2e7d32; color:white; }
    .btn-claim:disabled { background:#ccc; color:#666; }
    .btn-cancel { background:#c62828; color:white; }
    .btn-cancel:disabled { background:#ccc; color:#666; }
    .btn-reclaim { background:#1565c0; color:white; }
    .btn-reclaim:disabled { background:#ccc; color:#666; }
    hr { display:none; }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/></filter><filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter><linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f2f9ff"/><stop offset="100%" stop-color="#b8d8f8"/></linearGradient></defs><rect x="15" y="15" width="70" height="70" rx="18" fill="white" filter="url(#panelShadow)"/><g transform="translate(50,50) scale(0.8) translate(-50,-50)"><circle cx="50" cy="50" r="34" fill="url(#drop)" stroke="#e63946" stroke-width="7" filter="url(#iconShadow)"/><ellipse cx="40" cy="33" rx="8" ry="5" fill="white" opacity="0.5" transform="rotate(-25, 40, 33)"/><circle cx="44" cy="29" r="2" fill="white" opacity="0.8"/><text font-size="32" x="44" y="50" dominant-baseline="central" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🗳️</text><text font-size="32" x="56" y="50" dominant-baseline="central" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🏸</text></g></svg>
  <div class="card"><div class="poll-title" id="pollTitle"></div><div id="statusMsg" class="status-msg loading">Loading poll…</div><div id="spotsContainer" class="spots-list"></div><button id="claimBtn" class="btn btn-claim" disabled>🏸 Claim a Spot</button><button id="cancelBtn" class="btn btn-cancel" disabled style="display:none">Give Up</button></div>
  <script>
    const API='https://pollapp-rlmm.onrender.com';const token=localStorage.getItem('voterToken'),voterName=localStorage.getItem('voterName');
    const statusMsg=document.getElementById('statusMsg'),claimBtn=document.getElementById('claimBtn'),cancelBtn=document.getElementById('cancelBtn'),spotsContainer=document.getElementById('spotsContainer'),pollTitle=document.getElementById('pollTitle');
    async function loadPoll(){try{const[pollRes,spotRes]=await Promise.all([fetch(`${API}/current-poll`),token?fetch(`${API}/my-spot?token=${encodeURIComponent(token)}`).catch(()=>({json:()=>({hasSpot:false})})):Promise.resolve({json:()=>({hasSpot:false})})]);const poll=await pollRes.json(),mySpot=await spotRes.json();if(!poll.exists){statusMsg.className='status-msg loading';statusMsg.textContent='No active poll. Check back later.';pollTitle.textContent='';spotsContainer.innerHTML='';claimBtn.style.display='none';cancelBtn.style.display='none';return;}pollTitle.textContent=poll.title;renderSpots(poll.spots,poll.capacity);updateButtons(mySpot);}catch(err){statusMsg.className='status-msg error';statusMsg.textContent='Could not load poll.';}}
    function renderSpots(spots,capacity){const confirmed=spots.filter(s=>!s.cancelled),cancelled=spots.filter(s=>s.cancelled);cancelled.sort((a,b)=>new Date(b.cancelledAt)-new Date(a.cancelledAt));let html='';for(let i=0;i<confirmed.length;i++){const s=confirmed[i],cls=i<capacity?'spot-green':'spot-amber',time=new Date(s.claimedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});if(i===capacity&&confirmed.length>capacity){html+='<div class="separator"></div>';}const arrow=s.promoted?' <span style="color:#000;font-weight:bold;font-size:1.6rem" title="Promoted from waitlist">↑</span>':'';const reclaimArrow=s.reclaimed?' <span style="color:#1565c0;font-weight:bold;font-size:1.3rem" title="Re‑joined after giving up">↩</span>':'';html+=`<div class="spot-row ${cls}"><span>${s.name}${arrow}${reclaimArrow}</span><span class="small">${time}</span></div>`;}for(const s of cancelled){const claimTime=new Date(s.claimedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),cancelTime=new Date(s.cancelledAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});html+=`<div class="spot-row spot-blue"><span>${s.name} <span class="small">${claimTime}</span></span><span style="text-decoration:none;font-size:0.8rem;color:#1565c0">${cancelTime}</span></div>`;}if(html===''){html='<p style="text-align:center;color:#888">No spots claimed yet. Be the first!</p>';statusMsg.className='status-msg loading';statusMsg.textContent=`Poll open – ${capacity} spots available`;}else{statusMsg.style.display='none';}spotsContainer.innerHTML=html;}
    function updateButtons(mySpot){claimBtn.style.display='block';cancelBtn.style.display='none';if(!token||!voterName){claimBtn.disabled=true;claimBtn.textContent='Register first to claim';claimBtn.className='btn btn-claim';return;}if(mySpot.hasSpot&&mySpot.status==='active'){cancelBtn.style.display='block';cancelBtn.disabled=false;cancelBtn.textContent='Give Up';cancelBtn.className='btn btn-cancel';claimBtn.style.display='none';}else if(mySpot.hasSpot&&mySpot.status==='cancelled'){claimBtn.style.display='block';claimBtn.disabled=false;claimBtn.textContent='reClaim';claimBtn.className='btn btn-reclaim';cancelBtn.style.display='none';}else{claimBtn.style.display='block';claimBtn.disabled=false;claimBtn.textContent='🏸 Claim a Spot';claimBtn.className='btn btn-claim';cancelBtn.style.display='none';}}
    async function doClaim(){if(!token)return alert('You must register first.');const res=await fetch(`${API}/claim-spot`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});const data=await res.json();if(res.ok)await loadPoll();else alert(data.error||'Claim failed.');}
    async function doCancel(){if(!token)return;const res=await fetch(`${API}/cancel-spot`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});const data=await res.json();if(res.ok)await loadPoll();else alert(data.error||'Give Up failed.');}
    claimBtn.addEventListener('click',doClaim);cancelBtn.addEventListener('click',doCancel);
    loadPoll();setInterval(loadPoll,10000);window.addEventListener('focus',loadPoll);
    if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
  </script>
</body>
</html>
