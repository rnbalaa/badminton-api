<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Poll</title>
  <style>
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #c8e6c9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo { width: 100px; height: 100px; margin-bottom: 15px; }   /* BIGGER */
    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      max-width: 400px;
      width: 100%;
    }
    .names-list { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; }
    .name-btn {
      padding: 14px 16px; border-radius: 12px; border: 2px solid #ddd;
      background: white; font-size: 1rem; cursor: pointer; text-align: left;
      transition: background 0.2s, border-color 0.2s;
    }
    .name-btn:disabled { background: #f0f0f0; color: #aaa; border-color: #eee; cursor: not-allowed; text-decoration: line-through; }
    .name-btn:not(:disabled):hover { background: #e8f5e9; border-color: #2e7d32; }
    .result {
      margin: 15px 0; padding: 12px; border-radius: 10px; text-align: center; font-weight: 500;
    }
    .result.success { background: #e8f5e9; color: #2e7d32; }
    .result.error { background: #ffebee; color: #c62828; }
    .poll-title { color: #1e1e1e; font-weight: 600; margin-bottom: 20px; text-align: center; font-size: 1.2rem; }
    .status-msg {
      text-align: center; font-weight: 500; margin-bottom: 15px; padding: 12px; border-radius: 10px;
    }
    .status-msg.loading { background: #fff3e0; color: #e65100; }
    .status-msg.error { background: #ffebee; color: #c62828; }
    .spots-list {
      display: flex; flex-direction: column; gap: 6px; max-height: 55vh; overflow-y: auto; margin-bottom: 15px;
    }
    .spot-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-radius: 10px; font-weight: 500;
    }
    .spot-green { background: #e8f5e9; color: #2e7d32; }
    .spot-amber { background: #fff8e1; color: #f57f17; }
    .spot-blue { background: #e3f2fd; color: #1565c0; text-decoration: line-through; }
    .small { font-size: 0.8rem; color: #666; }
    .btn {
      width: 100%; padding: 16px; font-size: 1.2rem; border: none; border-radius: 14px;
      cursor: pointer; font-weight: 600; margin-bottom: 10px; transition: background 0.2s;
    }
    .btn-claim { background: #2e7d32; color: white; }
    .btn-claim:disabled { background: #ccc; color: #666; }
    .btn-cancel { background: #c62828; color: white; }
    .btn-cancel:disabled { background: #ccc; color: #666; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
      </filter>
      <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
      </filter>
      <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#f2f9ff"/>
        <stop offset="100%" stop-color="#b8d8f8"/>
      </linearGradient>
    </defs>
    <rect x="15" y="15" width="70" height="70" rx="18" fill="white" filter="url(#panelShadow)"/>
    <g transform="translate(50,50) scale(0.6) translate(-50,-50)">
      <circle cx="50" cy="50" r="34" fill="url(#drop)" stroke="#e63946" stroke-width="7" filter="url(#iconShadow)"/>
      <ellipse cx="40" cy="33" rx="6" ry="4" fill="white" opacity="0.5" transform="rotate(-25, 40, 33)"/>
      <circle cx="44" cy="29" r="1.5" fill="white" opacity="0.8"/>
      <text font-size="28" x="44" y="50" dominant-baseline="central" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🗳️</text>
      <text font-size="28" x="56" y="50" dominant-baseline="central" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🏸</text>
    </g>
  </svg>

  <div id="regSection" class="card hidden">
    <h2 style="text-align:center; margin:0 0 5px;">Welcome!</h2>
    <p style="text-align:center; color:#555; margin-bottom:15px;">Tap your name to register (once only)</p>
    <div id="regStatus" class="result" style="display:none;"></div>
    <div id="namesContainer" class="names-list">Loading…</div>
  </div>

  <div id="pollSection" class="card hidden">
    <div class="poll-title" id="pollTitle"></div>
    <div id="statusMsg" class="status-msg loading">Loading poll…</div>
    <div id="spotsContainer" class="spots-list"></div>
    <button id="claimBtn" class="btn btn-claim" disabled>🏸 Claim a Spot</button>
    <button id="cancelBtn" class="btn btn-cancel" disabled>Cancel My Spot</button>
  </div>

  <script>
    const API = 'https://pollapp-rlmm.onrender.com';
    const regSection = document.getElementById('regSection');
    const pollSection = document.getElementById('pollSection');
    let token = localStorage.getItem('voterToken');
    let voterName = localStorage.getItem('voterName');
    const namesContainer = document.getElementById('namesContainer');
    const regStatus = document.getElementById('regStatus');

    async function checkRegistration() {
      if (!token || !voterName) { showRegistration(); return; }
      try {
        const res = await fetch(`${API}/voter?token=${encodeURIComponent(token)}`);
        if (res.ok) { showPoll(); }
        else {
          localStorage.removeItem('voterToken'); localStorage.removeItem('voterName');
          token = null; voterName = null; showRegistration();
        }
      } catch (err) { showRegistration(); }
    }

    function showRegistration() {
      regSection.classList.remove('hidden'); pollSection.classList.add('hidden'); loadAvailableNames();
    }
    function showPoll() {
      regSection.classList.add('hidden'); pollSection.classList.remove('hidden'); loadPollData();
    }

    async function loadAvailableNames() {
      try {
        const res = await fetch(`${API}/available-names`);
        const data = await res.json();
        if (data.available.length === 0) {
          namesContainer.innerHTML = '<p style="text-align:center;color:#888;">All names claimed! 🎉</p>'; return;
        }
        namesContainer.innerHTML = data.available.map(name =>
          `<button class="name-btn" onclick="claimName('${name}')">${name}</button>`
        ).join('');
      } catch (err) { namesContainer.innerHTML = '<p style="color:#c62828;">⚠️ Could not load names.</p>'; }
    }

    async function claimName(name) {
      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('voterToken', data.token); localStorage.setItem('voterName', data.name);
          token = data.token; voterName = data.name;
          regStatus.style.display = 'block'; regStatus.className = 'result success';
          regStatus.textContent = `✅ You're all set, ${data.name}!`;
          setTimeout(() => { showPoll(); }, 1500);
        } else {
          regStatus.style.display = 'block'; regStatus.className = 'result error';
          regStatus.textContent = data.error || 'Registration failed.';
        }
      } catch (err) {
        regStatus.style.display = 'block'; regStatus.className = 'result error';
        regStatus.textContent = 'Connection error.';
      }
    }

    const pollTitle = document.getElementById('pollTitle'), statusMsg = document.getElementById('statusMsg'),
          claimBtn = document.getElementById('claimBtn'), cancelBtn = document.getElementById('cancelBtn'),
          spotsContainer = document.getElementById('spotsContainer');

    async function loadPollData() {
      try {
        const [pollRes, spotRes] = await Promise.all([
          fetch(`${API}/current-poll`),
          token ? fetch(`${API}/my-spot?token=${encodeURIComponent(token)}`) : Promise.resolve({ json: () => ({ hasSpot: false }) })
        ]);
        const poll = await pollRes.json(), mySpot = await spotRes.json();
        if (!poll.exists) {
          statusMsg.className = 'status-msg loading'; statusMsg.textContent = 'No active poll. Check back later.';
          pollTitle.textContent = ''; spotsContainer.innerHTML = '';
          claimBtn.classList.add('hidden'); cancelBtn.classList.add('hidden'); return;
        }
        pollTitle.textContent = poll.title;
        renderSpots(poll.spots, poll.capacity);
        updateButtons(mySpot);
      } catch (err) { statusMsg.className = 'status-msg error'; statusMsg.textContent = 'Could not load poll.'; }
    }

    function renderSpots(spots, capacity) {
      const confirmed = spots.filter(s => !s.cancelled), cancelled = spots.filter(s => s.cancelled);
      let html = '';
      for (let i = 0; i < confirmed.length; i++) {
        const s = confirmed[i], cls = i < capacity ? 'spot-green' : 'spot-amber',
              time = new Date(s.claimedAt).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        // BOLD BLUE ARROW – very visible
        const arrow = s.promoted ? ' <span style="color:#1565c0; font-weight:bold; font-size:1.2rem;">↑</span>' : '';
        html += `<div class="spot-row ${cls}"><span>${s.name}${arrow}</span><span class="small">${time}</span></div>`;
      }
      for (const s of cancelled) {
        const claimTime = new Date(s.claimedAt).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' }),
              cancelTime = new Date(s.cancelledAt).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        html += `<div class="spot-row spot-blue"><span>${s.name} <span class="small">${claimTime}</span></span><span style="text-decoration:none; font-size:0.8rem; color:#1565c0;">${cancelTime}</span></div>`;
      }
      if (html === '') {
        html = '<p style="text-align:center;color:#888;">No spots claimed yet. Be the first!</p>';
        statusMsg.className = 'status-msg loading'; statusMsg.textContent = `Poll open – ${capacity} spots available`;
      } else { statusMsg.classList.add('hidden'); }
      spotsContainer.innerHTML = html;
    }

    function updateButtons(mySpot) {
      claimBtn.classList.remove('hidden'); cancelBtn.classList.add('hidden');
      if (!token || !voterName) { claimBtn.disabled = true; claimBtn.textContent = 'Register first to claim'; return; }
      if (mySpot.hasSpot && mySpot.status === 'active') {
        claimBtn.classList.add('hidden'); cancelBtn.classList.remove('hidden');
        cancelBtn.disabled = false; cancelBtn.textContent = 'Cancel My Spot';
      } else if (mySpot.hasSpot && mySpot.status === 'cancelled') {
        claimBtn.disabled = true; claimBtn.textContent = 'You cancelled your spot';
      } else { claimBtn.disabled = false; claimBtn.textContent = '🏸 Claim a Spot'; }
    }

    claimBtn.addEventListener('click', async () => {
      if (!token) return alert('You must register first.');
      const res = await fetch(`${API}/claim-spot`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ token }) });
      const data = await res.json();
      if (res.ok) await loadPollData(); else alert(data.error || 'Claim failed.');
    });
    cancelBtn.addEventListener('click', async () => {
      if (!token) return;
      const res = await fetch(`${API}/cancel-spot`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ token }) });
      const data = await res.json();
      if (res.ok) await loadPollData(); else alert(data.error || 'Cancel failed.');
    });

    setInterval(loadPollData, 10000);
    window.addEventListener('focus', loadPollData);
    checkRegistration();
  </script>
</body>
</html>
